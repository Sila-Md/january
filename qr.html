<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SILA MD QR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00ff88;
  --expired: #ffe600;
  --accent2: #00ffcc;
  --bg-dark: #010101;
  --glass: rgba(15, 15, 25, 0.85);
  --text: #eaffff;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background:url("https://files.catbox.moe/36vahk.png") center/cover no-repeat fixed;
  color: var(--text);
  overflow-x:hidden;
  position: relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  z-index:0;
  transition: background 0.3s ease;
}

/* Content Card */
#content {
  position: relative;
  z-index:2;
  width:380px;
  margin:auto;
  top:8%;
  padding:24px 20px;
  border-radius:20px;
  background: var(--glass);
  backdrop-filter: blur(16px) saturate(180%);
  border: 1px solid rgba(0,255,136,.25);
  box-shadow:0 0 40px rgba(0,255,136,.4),0 0 50px rgba(255,255,0,.3);
  text-align:center;
}

/* Header */
#main {
  font-size:1.4rem;
  margin: 0.8rem 0 0.3rem 0;
  font-family: 'Share Tech Mono', monospace;
  text-transform: uppercase;
  color: var(--accent);
}

.legend{
  font-weight:400;
  font-size:0.9rem;
  margin-bottom:0.8rem;
  color:#ddd;
}

/* Session Type Selector */
.session-type{
  display:flex;
  gap:8px;
  margin-bottom:1rem;
}

.session-option{
  flex:1;
}

.session-option input[type="radio"]{
  display:none;
}

.session-option label{
  display:block;
  padding:10px 6px;
  text-align:center;
  border:2px solid rgba(255,255,255,.15);
  border-radius:10px;
  cursor:pointer;
  transition:all 0.3s;
  background:rgba(2,8,20,.7);
  font-size:0.7rem;
  font-family:'Share Tech Mono', monospace;
}

.session-option input[type="radio"]:checked + label{
  border-color:var(--accent);
  background:linear-gradient(135deg,rgba(0,255,136,.2),rgba(0,255,204,.2));
  box-shadow:0 0 15px rgba(0,255,136,.3);
}

.session-option .option-title{
  display:block;
  font-weight:700;
  font-size:0.8rem;
  color:var(--accent);
  margin-bottom:2px;
}

.session-option .option-desc{
  display:block;
  font-size:0.6rem;
  opacity:.75;
}

/* QR Image */
#QR-content img{
  border-radius:14px;
  width:230px;
  box-shadow:0 0 25px var(--accent);
  margin-bottom:0.8rem;
}

/* Neon Progress Bar */
progress{
  width:100%;
  height:12px;
  border-radius:6px;
  overflow:hidden;
  background:#111;
  border:1px solid rgba(0,255,136,.4);
  box-shadow:0 0 10px rgba(0,255,136,.3);
}
progress::-webkit-progress-bar{background:#111;}
progress::-webkit-progress-value{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.6);}
  100%{filter:brightness(1);}
}

/* Reload Button */
.reload-button{
  display:inline-block;
  margin-top:1.2rem;
  padding:12px 24px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#001;
  text-decoration:none;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
  font-size:0.9rem;
  box-shadow:0 0 20px rgba(0,255,150,.6);
  transition:0.3s;
}
.reload-button:hover{
  transform:scale(1.07);
  box-shadow:0 0 28px rgba(0,255,150,.9);
}

/* Floating WhatsApp */
.msg-btn{
  position:fixed;
  bottom:22px;
  right:22px;
  background:linear-gradient(135deg,#25d366,#00ff88);
  color:#001;
  padding:14px 18px;
  border-radius:50px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 0 25px rgba(0,255,136,.8);
  animation:float 2s ease-in-out infinite;
  z-index:5;
  font-family:'Orbitron', sans-serif;
  font-size:0.85rem;
}
@keyframes float{50%{transform:translateY(-8px)}}

/* Controls */
.controls{
  position:fixed;
  bottom:22px;
  left:22px;
  display:flex;
  gap:10px;
  z-index:5;
}
.controls button{
  padding:10px 14px;
  border:none;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#001;
  box-shadow:0 0 18px rgba(0,255,136,.6);
  font-family:'Orbitron', sans-serif;
  font-size:0.75rem;
}
</style>
</head>
<body>

<div id="content">
  <!-- Session Type Selection -->
  <div class="session-type">
    <div class="session-option">
      <input type="radio" id="long-session" name="session-type" value="long" checked>
      <label for="long-session">
        <span class="option-title">🔑 Long Session</span>
        <span class="option-desc">Compressed string</span>
      </label>
    </div>
    <div class="session-option">
      <input type="radio" id="creds-session" name="session-type" value="creds">
      <label for="creds-session">
        <span class="option-title">📁 Creds.json</span>
        <span class="option-desc">Full JSON file</span>
      </label>
    </div>
  </div>

  <div id="QR-content">
    <img id="qr-image" src="/server" alt="QR CODE">
  </div>
  <div id="title-container">
    <h2 id="main">SILA QR</h2>
    <p class="legend" id="legend">Scan The QR Code</p>
  </div>
  <div id="description-container">
    <progress value="0" max="30" id="progressBar"></progress>
  </div>
  <a href="javascript:location.reload()" class="reload-button" id="reload-btn">⟳ Reload Page</a>
</div>

<!-- Floating WhatsApp -->
<a class="msg-btn" href="https://wa.me/255789661031" target="_blank">💬 MESSAGE</a>

<!-- Controls -->
<div class="controls">
  <button id="toggle-overlay">🌙 Overlay</button>
</div>

<script>
// Dark overlay toggle
let overlayOn=true;
document.getElementById("toggle-overlay").onclick=()=>{
  overlayOn=!overlayOn;
  const styleSheet=document.styleSheets[0];
  for(let i=0;i<styleSheet.cssRules.length;i++){
    if(styleSheet.cssRules[i].selectorText=="body::before"){
      styleSheet.cssRules[i].style.background=`rgba(0,0,0,${overlayOn?.65:0})`;
    }
  }
};

// Session type management
function getSessionType(){
  const longRadio=document.getElementById("long-session");
  return longRadio.checked?"long":"creds";
}

// Update QR source when session type changes
function updateQRSrc(){
  const qrImg=document.getElementById("qr-image");
  const sessionType=getSessionType();
  qrImg.src=`/server?session=${sessionType}`;
}

// Listen for session type changes
document.getElementById("long-session").addEventListener("change", ()=>{
  updateQRSrc();
  resetProgress();
});

document.getElementById("creds-session").addEventListener("change", ()=>{
  updateQRSrc();
  resetProgress();
});

// Update reload button
document.getElementById("reload-btn").addEventListener("click", (e)=>{
  e.preventDefault();
  updateQRSrc();
  resetProgress();
  location.reload();
});

// Reset progress bar
function resetProgress(){
  timeleft = 30;
  progressBar.value = 0;
  mainTitle.innerHTML = "SILA QR";
  mainTitle.style.color = "var(--accent)";
  legend.innerHTML = "Scan The QR Code";
}

// Progress bar
let timeleft = 30;
const progressBar = document.getElementById("progressBar");
const mainTitle = document.getElementById("main");
const legend = document.getElementById("legend");

const downloadTimer = setInterval(()=>{
  if(timeleft<=0){
    clearInterval(downloadTimer);
    progressBar.remove();
    mainTitle.innerHTML="⚠ QR Expired! Please reload";
    mainTitle.style.color="var(--expired)";
    legend.innerHTML="";
  } else {
    progressBar.value=30-timeleft;
    mainTitle.style.color="var(--accent)";
    timeleft-=1;
  }
},1000);

// Set initial QR source with session type
updateQRSrc();
</script>

</body>
</html>
